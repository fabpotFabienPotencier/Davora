name: Build Android App (APK)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Build Next.js Static Export
      run: npm run build
      env:
        EXPORT_MOBILE: 'true'

    - name: Install Capacitor Core & Android
      run: npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Add and Sync Android Platform
      run: |
        npx cap add android
        npx cap sync android

    - name: Upgrade Gradle Wrapper to 8.5
      run: |
        sed -i 's/gradle-8.2.1-all.zip/gradle-8.5-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties

    - name: Build Android Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: davora-android-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
